name: "build-packages"

on:
  push:
    branches:
      - "main"
    paths:
      - "packages/**"
      - ".github/workflows/build-packages.yaml"
      - ".github/workflows/services.json"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Build all services regardless of changes"
        type: boolean
        default: false

jobs:
  # Detect which services have changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.output.outputs.services }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: sergeysova/jq-action@a3f0d4ff59cc1dddf023fc0b325dd75b10deec58 # v2
        id: filter-rules
        if: inputs.force_all != true
        with:
          cmd: "jq 'map_values([.path])' .github/workflows/services.json -r -c"

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        if: inputs.force_all != true
        with:
          filters: ${{ steps.filter-rules.outputs.value }}

      - name: Set services output
        id: output
        run: |
          if [ "${{ inputs.force_all }}" = "true" ]; then
            echo "services=$(jq 'keys' .github/workflows/services.json -c)" >> $GITHUB_OUTPUT
          else
            echo "services=${{ steps.filter.outputs.changes }}" >> $GITHUB_OUTPUT
          fi

  # Build matrix of services
  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Forgejo Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: forgejo.salamon.xyz
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGE_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: forgejo.salamon.xyz/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=ref,event=branch

      - name: Get build path
        id: build-path
        uses: sergeysova/jq-action@a3f0d4ff59cc1dddf023fc0b325dd75b10deec58 # v2
        with:
          cmd: |
            jq '."${{ matrix.service }}".path | split("/") | .[0:-1] | "./" + join("/") + "/"' .github/workflows/services.json -r -c

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ steps.build-path.outputs.value }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get nomad job file
        id: job-file
        uses: sergeysova/jq-action@a3f0d4ff59cc1dddf023fc0b325dd75b10deec58 # v2
        with:
          cmd: |
            jq '."${{ matrix.service }}".job_file' .github/workflows/services.json -r -c

      - name: Set short commit SHA
        id: sha
        run: echo "SHORT_SHA=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_ENV

      - name: Create build result artifact
        if: steps.build-push.outcome == 'success'
        run: |
          mkdir -p build-results
          cat <<EOF > build-results/${{ matrix.service }}.json
          {
            "service": "${{ matrix.service }}",
            "tag": "${{ github.ref_name }}-${{ env.SHORT_SHA }}",
            "job_file": "${{ steps.job-file.outputs.value }}",
            "image": "forgejo.salamon.xyz/${{ github.repository_owner }}/${{ matrix.service }}"
          }
          EOF

      - name: Upload build result
        if: steps.build-push.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-result-${{ matrix.service }}
          path: build-results/${{ matrix.service }}.json
          retention-days: 1

  # Commit all updates in a single commit
  commit:
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ssh-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Download all build results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: build-result-*
          path: build-results
          merge-multiple: true

      - name: Apply all updates
        id: apply
        run: |
          DEPLOYED_SERVICES=""
          UPDATED_FILES=""

          for result_file in build-results/*.json; do
            if [ ! -f "$result_file" ]; then
              echo "No build results found"
              continue
            fi

            SERVICE=$(jq -r '.service' "$result_file")
            TAG=$(jq -r '.tag' "$result_file")
            NOMAD_JOB=$(jq -r '.job_file' "$result_file")
            IMAGE_NAME=$(jq -r '.image' "$result_file")

            if [ ! -f "${NOMAD_JOB}" ]; then
              echo "Warning: ${NOMAD_JOB} not found, skipping ${SERVICE}"
              continue
            fi

            echo "Updating ${SERVICE} to ${TAG} in ${NOMAD_JOB}"
            sed -i -E "s|(image[[:space:]]*=[[:space:]]*\"${IMAGE_NAME}:)[^\"]+|\1${TAG}|g" "${NOMAD_JOB}"

            if ! git diff --quiet "${NOMAD_JOB}" 2>/dev/null; then
              if [ -z "$DEPLOYED_SERVICES" ]; then
                DEPLOYED_SERVICES="${SERVICE}@${TAG}"
                UPDATED_FILES="${NOMAD_JOB}"
              else
                DEPLOYED_SERVICES="${DEPLOYED_SERVICES}, ${SERVICE}@${TAG}"
                UPDATED_FILES="${UPDATED_FILES} ${NOMAD_JOB}"
              fi
            fi
          done

          if [ -n "$DEPLOYED_SERVICES" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "deployed_services=${DEPLOYED_SERVICES}" >> $GITHUB_OUTPUT
            echo "updated_files=${UPDATED_FILES}" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit all changes
        if: steps.apply.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "chore: bump ${{ steps.apply.outputs.deployed_services }}"
          file_pattern: ${{ steps.apply.outputs.updated_files }}
