name: "build-derivations"

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "**.md"
      - "nomad/**"
      - "packages/**"
      - "terraform/**"
      - ".github/workflows/build-packages.yaml"
      - ".github/workflows/terraform-apply.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: nix

    env:
      SOPS_AGE_SSH_PRIVATE_KEY_FILE: /tmp/git_id_ed25519

    steps:
      - name: Configure SOPS git filter
        run: |
          cat >> ~/.gitconfig <<EOF
          [filter "sops"]
              smudge = sops --decrypt --input-type binary /dev/stdin
              clean = sops --encrypt --input-type binary --output-type binary /dev/stdin
              required = true
          EOF

      - name: Store SSH private key
        run: |
          echo "${{ secrets.AGECRYPT_KEY }}" | base64 -d > $SOPS_AGE_SSH_PRIVATE_KEY_FILE
          chmod 600 $SOPS_AGE_SSH_PRIVATE_KEY_FILE

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build systems
        run: |
          nix run github:Mic92/nix-fast-build -- \
            --flake .#checks \
            --systems "x86_64-linux aarch64-linux" \
            --no-nom \
            --skip-cached \
            --result-file result.json \
            --eval-workers 2

      - name: Debug result format
        if: always()
        run: cat result.json | jq . || echo "no result.json"
