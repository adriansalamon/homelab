name: "build-derivations"

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "**.md"
      - "nomad/**"
      - "packages/**"
      - "terraform/**"
      - ".github/workflows/build-packages.yaml"
      - ".github/workflows/terraform-apply.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        machine:
          - host: athena
          - host: charon
          - host: demeter
          - host: hermes
          - host: icarus
          - host: orpheus
          - host: penelope
          - host: pythia
          - host: zeus

    env:
      SOPS_AGE_SSH_PRIVATE_KEY_FILE: /tmp/git_id_ed25519

    steps:
      - name: "Setup Nix cache"
        run: |
          sudo mkdir -p /etc/nix
          echo "machine nix-cache.salamon.xyz password ${{ secrets.ATTIC_TOKEN }}" | sudo tee /etc/nix/netrc > /dev/null

      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31
        with:
          extra_nix_config: |
            substituters = https://nix-cache.salamon.xyz/homelab https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= homelab:leKffLkOCSfX8pPGaQltduLxJNNVmG5oGPt6w3fH4t0=
            always-allow-substitutes = true
            allow-import-from-derivation = false

      - name: Install sops
        run: |
          curl -Lo sops https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64
          chmod +x sops && sudo mv sops /usr/local/bin

      - name: Configure SOPS git filter
        run: |
          cat >> ~/.gitconfig <<EOF
          [filter "sops"]
              smudge = sops --decrypt --input-type binary /dev/stdin
              clean = sops --encrypt --input-type binary --output-type binary /dev/stdin
              required = true
          EOF

      - name: Store SSH private key
        run: |
          echo "${{ secrets.AGECRYPT_KEY }}" | base64 -d > $SOPS_AGE_SSH_PRIVATE_KEY_FILE
          chmod 600 $SOPS_AGE_SSH_PRIVATE_KEY_FILE

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # TODO: this does not work reliably
      - name: Check if build needed
        id: build-needed
        run: |
          nix build .#nixosConfigurations.${{ matrix.machine.host }}.config.system.build.toplevel --dry-run 2> dry-run-output
          echo "needs-build=$(cat dry-run-output | grep 'will be built' &> /dev/null && echo 1 || echo 0)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build system
        if: steps.build-needed.outputs.needs-build == '1'
        run: |
          nix build .#nixosConfigurations.${{ matrix.machine.host }}.config.system.build.toplevel

      - name: Push system
        if: steps.build-needed.outputs.needs-build == '1'
        run: |
          nix run nixpkgs#attic-client login ci https://nix-cache.salamon.xyz ${{ secrets.ATTIC_TOKEN }}
          nix run nixpkgs#attic-client push homelab result -j 2

      - name: Update key-val store
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST -sS --fail-with-body --url "https://kv-proxy.salamon.xyz/builds/nixos-system-${{ matrix.machine.host }}" \
               -H  "Authorization: Bearer ${{ secrets.KV_PROXY_TOKEN }}" \
               -d  "$(readlink result || nix eval --raw --read-only .#nixosConfigurations.${{ matrix.machine.host }}.config.system.build.toplevel)"
