name: Terraform Apply

on:
  push:
    branches:
      - "main"
    paths:
      - "nomad/**"
      - "nix/terraform-jobs.nix"
      - "terraform/jobs/**"
      - ".github/workflows/terraform-apply.yaml"
  workflow_dispatch:

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    enable-openid-connect: true
    name: Apply Nomad Jobs
    runs-on: nix
    env:
      VAULT_ADDR: https://vault.local.salamon.xyz

    steps:
      - name: Configure SOPS git filter
        run: |
          cat >> ~/.gitconfig <<EOF
          [filter "sops"]
              smudge = sops --decrypt --input-type binary /dev/stdin
              clean = sops --encrypt --input-type binary --output-type binary /dev/stdin
              required = true
          EOF

      - name: Get Vault token via Forgejo OIDC
        run: |
          OIDC_TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL" \
            | jq -r .value)
          VAULT_TOKEN=$(curl -sSf \
            --request POST \
            --data "{\"jwt\": \"$OIDC_TOKEN\", \"role\": \"terraform-apply\"}" \
            "$VAULT_ADDR/v1/auth/jwt-forgejo/login" | jq -r .auth.client_token)
          echo "VAULT_TOKEN=$VAULT_TOKEN" >> $GITHUB_ENV

      - name: Get Nomad management token
        run: |
          NOMAD_TOKEN=$(curl -sSf \
            --header "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/nomad/creds/admin" | jq -r .data.secret_id)
          echo "NOMAD_TOKEN=$NOMAD_TOKEN" >> $GITHUB_ENV

      - name: Get Consul management token
        run: |
          CONSUL_HTTP_TOKEN=$(curl -sSf \
            --header "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/consul/creds/terraform-apply" | jq -r .data.token)
          echo "CONSUL_HTTP_TOKEN=$CONSUL_HTTP_TOKEN" >> $GITHUB_ENV

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize Terraform
        run: nix run --option allow-import-from-derivation true path:.#terraform-jobs.init

      - name: Plan Terraform changes
        id: plan
        run: nix run --option allow-import-from-derivation true path:.#terraform-jobs.terraform plan -- -out=plan.tfplan

      - name: Apply Terraform changes
        run: nix run --option allow-import-from-derivation true path:.#terraform-jobs.terraform apply -- plan.tfplan

      - name: Cleanup plan file
        if: always()
        run: rm -f plan.tfplan
