name: Terraform Apply

on:
  push:
    branches:
      - "none"
    paths:
      - "nomad/**"
      - "nix/terraform-jobs.nix"
      - "terraform/jobs/**"
      - ".github/workflows/terraform-apply.yaml"
  workflow_dispatch:

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    name: Apply Nomad Jobs
    runs-on: [self-hosted, nomad]
    steps:
      - name: Install sops
        run: |
          curl -Lo sops https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64
          chmod +x sops && sudo mv sops /usr/local/bin

      - name: Configure SOPS git filter
        run: |
          cat >> ~/.gitconfig <<EOF
          [filter "sops"]
              smudge = sops --decrypt --input-type binary /dev/stdin
              clean = sops --encrypt --input-type binary --output-type binary /dev/stdin
              required = true
          EOF

      - name: Get nomad management token
        run: |
          NOMAD_TOKEN=$(curl -sSf \
                 --header "X-Vault-Token: $VAULT_TOKEN" \
                 "$VAULT_ADDR/v1/nomad/creds/admin" | jq -r .data.secret_id)
          echo "NOMAD_TOKEN=$NOMAD_TOKEN" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize Terraform
        run: nix run path:.#terraform-jobs.init

      - name: Plan Terraform changes
        id: plan
        run: |
          nix run path:.#terraform-jobs.terraform plan -- -out=plan.tfplan

      - name: Apply Terraform changes
        run: |
          nix run path:.#terraform-jobs.terraform apply -- plan.tfplan

      - name: Cleanup plan file
        if: always()
        run: rm -f plan.tfplan
