version: 3

# Explicitly define only the root project
# This prevents Atlantis from auto-detecting terraform/infra as a separate project
projects:
  - dir: .
    workspace: default
    workflow: terraform-jobs

    autoplan:
      when_modified:
        - "nomad/jobs/**"
        - "nix/terraform-jobs.nix"
        - "nomad/lib/**"
      enabled: true

    apply_requirements: [] # Auto-apply on push to main

workflows:
  terraform-jobs:
    plan:
      steps:
        - run: |
            nix run .#terraform-jobs.init
            nix run .#terraform-jobs.terraform plan -- -out=$PLANFILE

    apply:
      steps:
        - run: |
            nix run .#terraform-jobs.terraform apply $PLANFILE
