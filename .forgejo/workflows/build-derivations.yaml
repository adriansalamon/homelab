name: "build-derivations"

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "**.md"
      - "nomad/**"
      - "packages/**"
      - "terraform/**"
      - ".forgejo/workflows/build-packages.yaml"
      - ".forgejo/workflows/terraform-apply.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: nix

    env:
      SOPS_AGE_SSH_PRIVATE_KEY_FILE: /tmp/git_id_ed25519

    steps:
      - name: Configure SOPS git filter
        run: |
          cat >> ~/.gitconfig <<EOF
          [filter "sops"]
              smudge = sops --decrypt --input-type binary /dev/stdin
              clean = sops --encrypt --input-type binary --output-type binary /dev/stdin
              required = true
          EOF

      - name: Store SSH private key
        run: |
          echo "${{ secrets.AGECRYPT_KEY }}" | base64 -d > $SOPS_AGE_SSH_PRIVATE_KEY_FILE
          chmod 600 $SOPS_AGE_SSH_PRIVATE_KEY_FILE

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to attic
        run: attic login ci https://nix-cache.salamon.xyz ${{ secrets.ATTIC_TOKEN }}

      - name: Build systems
        continue-on-error: true
        run: |
          nix run github:Mic92/nix-fast-build -- \
            --flake .#checks \
            --systems "x86_64-linux aarch64-linux" \
            --no-nom \
            --skip-cached \
            --attic-cache homelab \
            --result-file result.json \
            --eval-workers 4
          echo "=== Build Summary ==="
          cat /var/run/act/workflow/SUMMARY.md || echo "no summary"

      - name: Update key-val store
        if: always() && github.ref == 'refs/heads/main'
        run: |
          jq -r '.results[] | select(.type == "BUILD" and .success == true) | .attr + " " + .outputs.out' result.json | \
          while read -r attr store_path; do
            host=$(echo "$attr" | cut -d. -f2)
            echo "Updating ${host}: ${store_path}"
            curl -X POST -sS --fail-with-body \
              --url "https://kv-proxy.salamon.xyz/builds/nixos-system-${host}" \
              -H "Authorization: Bearer ${{ secrets.KV_PROXY_TOKEN }}" \
              -d "$store_path"
            echo "Updated ${host}"
          done
