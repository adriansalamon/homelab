name: "build-packages"

on:
  push:
    branches:
      - "main"
    paths:
      - "packages/**"
      - ".forgejo/workflows/build-packages.yaml"
      - ".forgejo/workflows/services.json"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Build all services regardless of changes"
        type: boolean
        default: false

jobs:
  # Detect which services have changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.output.outputs.services }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: output
        run: |
          if [ "${{ inputs.force_all }}" = "true" ]; then
            echo "services=$(jq -c 'keys' .forgejo/workflows/services.json)" >> $GITHUB_OUTPUT
          else
            SERVICES='[]'
            while IFS= read -r service; do
              prefix=$(jq -r ".[\"$service\"].path" .forgejo/workflows/services.json | sed 's/\*\*$//' | sed 's|/$||')
              if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "^${prefix}"; then
                SERVICES=$(echo "$SERVICES" | jq -c --arg s "$service" '. + [$s]')
              fi
            done < <(jq -r 'keys[]' .forgejo/workflows/services.json)
            echo "services=$SERVICES" >> $GITHUB_OUTPUT
          fi

  # Build matrix of services
  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    outputs:
      tag: ${{ steps.sha.outputs.tag }}

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set tag
        id: sha
        run: echo "tag=${{ github.ref_name }}-$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Forgejo Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: forgejo.salamon.xyz
          username: ${{ github.actor }}
          password: ${{ secrets.PACKAGE_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: forgejo.salamon.xyz/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Get build path
        id: build-path
        uses: sergeysova/jq-action@a3f0d4ff59cc1dddf023fc0b325dd75b10deec58 # v2
        with:
          cmd: |
            jq '."${{ matrix.service }}".path | split("/") | .[0:-1] | "./" + join("/") + "/"' .forgejo/workflows/services.json -r -c

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ steps.build-path.outputs.value }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=forgejo.salamon.xyz/${{ github.repository_owner }}/${{ matrix.service }}:cache
          cache-to: type=registry,ref=forgejo.salamon.xyz/${{ github.repository_owner }}/${{ matrix.service }}:cache,mode=max

  # Commit all updates in a single commit
  commit:
    needs: [detect-changes, build]
    if: always() && needs.detect-changes.outputs.services != '[]' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host forgejo.salamon.xyz
            Port 2222
          EOF

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ssh-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          ssh-known-hosts: "[forgejo.salamon.xyz]:2222 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFEZLMz6hduphZCX1qeCAzUIG2fv2Qm0opTVvcQWXfgQ"

      - name: Apply all updates
        id: apply
        run: |
          SERVICES='${{ needs.detect-changes.outputs.services }}'
          TAG='${{ needs.build.outputs.tag }}'
          DEPLOYED_SERVICES=""
          UPDATED_FILES=""

          for SERVICE in $(echo "$SERVICES" | jq -r '.[]'); do
            NOMAD_JOB=$(jq -r '."'"$SERVICE"'".job_file' .forgejo/workflows/services.json)
            IMAGE_NAME="forgejo.salamon.xyz/${{ github.repository_owner }}/${SERVICE}"

            if [ ! -f "${NOMAD_JOB}" ]; then
              echo "Warning: ${NOMAD_JOB} not found, skipping ${SERVICE}"
              continue
            fi

            echo "Updating ${SERVICE} to ${TAG} in ${NOMAD_JOB}"
            sed -i -E "s|(image[[:space:]]*=[[:space:]]*\")[^\"]+/${SERVICE}:[^\"]+|\1${IMAGE_NAME}:${TAG}|g" "${NOMAD_JOB}"

            if ! git diff --quiet "${NOMAD_JOB}" 2>/dev/null; then
              DEPLOYED_SERVICES="${DEPLOYED_SERVICES:+${DEPLOYED_SERVICES}, }${SERVICE}@${TAG}"
              UPDATED_FILES="${UPDATED_FILES:+${UPDATED_FILES} }${NOMAD_JOB}"
            fi
          done

          if [ -n "$DEPLOYED_SERVICES" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "deployed_services=${DEPLOYED_SERVICES}" >> $GITHUB_OUTPUT
            echo "updated_files=${UPDATED_FILES}" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit all changes
        if: steps.apply.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "chore: bump ${{ steps.apply.outputs.deployed_services }}"
          file_pattern: ${{ steps.apply.outputs.updated_files }}
